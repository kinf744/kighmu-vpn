name: Build Xray for Android ARM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone Xray-core
        run: git clone --depth=1 https://github.com/XTLS/Xray-core.git

      - name: Build Xray armeabi-v7a
        run: |
          cd Xray-core
          export CC=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          export CXX=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++
          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 \
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o ../libxray.so \
            ./main
          ls -lh ../libxray.so

      - name: Compress with UPX
        run: |
          sudo apt-get install -y upx
          upx --best --lzma libxray.so || echo "UPX failed, keeping uncompressed"
          ls -lh libxray.so

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: libxray-armeabi-v7a
          path: libxray.so
