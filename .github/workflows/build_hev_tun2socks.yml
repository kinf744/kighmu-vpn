name: Build hev-socks5-tunnel armeabi-v7a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone hev-socks5-tunnel
        run: git clone --depth=1 --recurse-submodules https://github.com/heiher/hev-socks5-tunnel.git

      - name: Build with Android.mk
        run: |
          cd hev-socks5-tunnel
          $NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            APP_ABI=armeabi-v7a \
            APP_PLATFORM=android-21 \
            NDK_OUT=build/obj \
            NDK_LIBS_OUT=build/libs
          find build/ -type f | head -20

      - name: Copy binary
        run: |
          find hev-socks5-tunnel/build -type f | head -20
          cp $(find hev-socks5-tunnel/build -type f | head -1) libtun2socks.so
          ls -lh libtun2socks.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tunnel-armeabi-v7a
          path: libtun2socks.so
