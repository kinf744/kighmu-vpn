name: Build hev-socks5-tunnel armeabi-v7a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone hev-socks5-tunnel
        run: git clone --depth=1 --recurse-submodules https://github.com/heiher/hev-socks5-tunnel.git

      - name: Check Android.mk
        run: |
          cat hev-socks5-tunnel/Android.mk
          cat hev-socks5-tunnel/Application.mk

      - name: Build with ndk-build
        run: |
          cd hev-socks5-tunnel
          $NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            APP_ABI=armeabi-v7a \
            APP_PLATFORM=android-21 \
            NDK_OUT=build/obj \
            NDK_LIBS_OUT=build/libs \
            V=1 2>&1 | tail -30
          echo "=== Tous les fichiers produits ==="
          find build/ -type f 2>/dev/null || echo "Aucun fichier dans build/"
          find . -name "*.so" -o -name "hev-socks5-tunnel" 2>/dev/null | grep -v ".git"

      - name: Upload all build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hev-build-output
          path: hev-socks5-tunnel/build/
