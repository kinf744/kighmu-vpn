name: Build hev-socks5-tunnel armeabi-v7a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake ninja-build

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone hev-socks5-tunnel
        run: git clone --depth=1 https://github.com/heiher/hev-socks5-tunnel.git

      - name: Build armeabi-v7a
        run: |
          cd hev-socks5-tunnel
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          find . -type f -executable | head -10
          find . -name "*.so" | head -10

      - name: Copy binary
        run: |
          BINARY=$(find hev-socks5-tunnel/build -type f -executable | head -1)
          echo "Binary: $BINARY"
          cp "$BINARY" libtun2socks.so
          ls -lh libtun2socks.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tunnel-armeabi-v7a
          path: libtun2socks.so
