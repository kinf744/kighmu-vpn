name: Build hev-socks5-tunnel armeabi-v7a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone hev-socks5-tunnel
        run: git clone --depth=1 --recurse-submodules https://github.com/heiher/hev-socks5-tunnel.git

      - name: Fix fd_set conflict
        run: |
          cd hev-socks5-tunnel
          # Supprimer le typedef fd_set conflictuel
          sed -i 's/typedef __kernel_fd_set fd_set;//g' \
            third-part/lwip/src/ports/unix/include/cc.h 2>/dev/null || true
          find . -name "cc.h" | xargs grep -l "kernel_fd_set" | \
            xargs sed -i 's/typedef __kernel_fd_set fd_set;//g' 2>/dev/null || true

      - name: Build armeabi-v7a
        run: |
          cd hev-socks5-tunnel
          CC=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          make \
            CC=$CC \
            CFLAGS="-D__ANDROID__ -DANDROID -fPIE" \
            LDFLAGS="-fPIE -pie" \
            ARCH=arm
          find . -type f -executable -not -path "*/.git/*" | head -10

      - name: Copy binary
        run: |
          BINARY=$(find hev-socks5-tunnel -type f -executable -not -path "*/.git/*" | grep -v "\.sh" | head -1)
          echo "Binary: $BINARY"
          cp "$BINARY" libtun2socks.so
          ls -lh libtun2socks.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hev-socks5-tunnel-armeabi-v7a
          path: libtun2socks.so
