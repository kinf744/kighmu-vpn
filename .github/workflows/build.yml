name: Build KIGHMU VPN

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -p /tmp/gradle.zip "*/gradle-wrapper.jar" > gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build Xray
        continue-on-error: true
        run: |
          for ABI_GOARCH in "arm64-v8a arm64" "armeabi-v7a arm" "x86_64 amd64"; do
            ABI=$(echo $ABI_GOARCH | cut -d' ' -f1)
            GOARCH=$(echo $ABI_GOARCH | cut -d' ' -f2)
            mkdir -p app/src/main/assets/xray/$ABI
            CGO_ENABLED=0 GOOS=android GOARCH=$GOARCH \
              go build -trimpath -ldflags="-s -w" \
              -o app/src/main/assets/xray/$ABI/xray \
              github.com/xtls/xray-core/main 2>/dev/null || true
          done

      - name: Build Hysteria2
        continue-on-error: true
        run: |
          for ABI_GOARCH in "arm64-v8a arm64" "armeabi-v7a arm" "x86_64 amd64"; do
            ABI=$(echo $ABI_GOARCH | cut -d' ' -f1)
            GOARCH=$(echo $ABI_GOARCH | cut -d' ' -f2)
            mkdir -p app/src/main/assets/hysteria/$ABI
            CGO_ENABLED=0 GOOS=android GOARCH=$GOARCH \
              go build -trimpath -ldflags="-s -w" \
              -o app/src/main/assets/hysteria/$ABI/hysteria2 \
              github.com/apernet/hysteria/app/cmd 2>/dev/null || true
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Sign APK
        id: sign
        continue-on-error: true
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Collect APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/KIGHMU-VPN-debug.apk 2>/dev/null || true
          SIGNED="${{ steps.sign.outputs.signedReleaseFile }}"
          if [ -f "$SIGNED" ]; then
            cp "$SIGNED" dist/KIGHMU-VPN-release-signed.apk
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk dist/KIGHMU-VPN-release-unsigned.apk 2>/dev/null || true
          fi
          ls -lh dist/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: dist/*.apk
          retention-days: 90
