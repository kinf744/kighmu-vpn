name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Get Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/g.zip
          cd /tmp && unzip g.zip
          find /tmp -name "gradle-wrapper.jar" -exec cp {} $GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar \;
          cd $GITHUB_WORKSPACE && chmod +x gradlew
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
