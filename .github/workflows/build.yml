name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build dnstt-client for Android ARM
        run: |
          mkdir -p app/src/main/assets/dnstt
          # Creer module Go temporaire et telecharger dnstt
          mkdir -p /tmp/dnstt-build
          cd /tmp/dnstt-build
          go mod init dnstt-build
          GONOSUMCHECK=* GOFLAGS=-mod=mod GOPROXY=https://proxy.golang.org,direct             GONOSUMDB=* GOPATH=/tmp/gopath             go get github.com/jech/dnstt/dnstt-client@master 2>&1 || true
          # Trouver les sources
          find /tmp/gopath -name "main.go" -path "*/dnstt-client/*" 2>/dev/null | head -3
          SRC=$(find /tmp/gopath -name "main.go" -path "*/dnstt-client/*" 2>/dev/null | head -1 | xargs dirname)
          echo "Source dir: $SRC"
          if [ -n "$SRC" ]; then
            cd $SRC
            GOOS=android GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -v -o /tmp/dnstt-client . 2>&1
          fi
          if [ -f /tmp/dnstt-client ]; then
            cp /tmp/dnstt-client $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
            echo "SUCCESS: $(ls -la $GITHUB_WORKSPACE/app/src/main/assets/dnstt/)"
          else
            echo "FAILED - placeholder"
            printf 'placeholder' > $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
          fi
      - name: Build APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
