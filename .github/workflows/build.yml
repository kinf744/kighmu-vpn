name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build dnstt-client for Android ARM
        run: |
          mkdir -p app/src/main/assets/dnstt
          # Telecharger via API GitHub
          curl -fsSL -H "Accept: application/vnd.github.v3+json"             "https://api.github.com/repos/jech/dnstt/tarball/master"             -o /tmp/dnstt.tar.gz
          echo "Downloaded: $(ls -la /tmp/dnstt.tar.gz)"
          echo "Type: $(file /tmp/dnstt.tar.gz)"
          tar -xzf /tmp/dnstt.tar.gz -C /tmp/
          DNSTT_DIR=$(ls /tmp | grep -i dnstt | grep -v tar | head -1)
          echo "Dir: $DNSTT_DIR"
          cd /tmp/$DNSTT_DIR/dnstt-client
          GOOS=android GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -v -o /tmp/dnstt-client . 2>&1
          if [ -f /tmp/dnstt-client ]; then
            cp /tmp/dnstt-client $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
            echo "SUCCESS: $(ls -la $GITHUB_WORKSPACE/app/src/main/assets/dnstt/)"
          else
            echo "FAILED - using placeholder"
            echo "placeholder" > $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
          fi
      - name: Build APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
