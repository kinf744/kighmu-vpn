name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download native binaries and build tun2socks armv7 JNI
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

          # Binaires arm64
          curl -L -o app/src/main/jniLibs/arm64-v8a/libdnstt.so https://github.com/kinf744/kighmu-vpn/releases/download/v1.0-binary/libdnstt-arm64.so
          curl -L -o app/src/main/jniLibs/arm64-v8a/libtun2socks.so https://github.com/kinf744/kighmu-vpn/releases/download/v1.0-binary/libtun2socks-arm64.so

          # dnstt armv7
          curl -L -o app/src/main/jniLibs/armeabi-v7a/libdnstt.so https://github.com/kinf744/kighmu-vpn/releases/download/v1.0-binary/libdnstt-arm64.so

          # Compiler tun2socks armv7 JNI avec Go
          git clone --depth=1 https://github.com/eycorsican/go-tun2socks.git /tmp/tun2socks
          cd /tmp/tun2socks

          # Creer le wrapper JNI avec le bon package
          mkdir -p jni
          cat > jni/jni_bridge.go << 'GOEOF'
          package main

          /*
          #include <jni.h>
          */
          import "C"
          import (
            "github.com/eycorsican/go-tun2socks/core"
            "github.com/eycorsican/go-tun2socks/proxy/socks"
            "os"
          )

          //export Java_dev_epro_tun2socks_Tun2Socks_runTun2Socks
          func Java_dev_epro_tun2socks_Tun2Socks_runTun2Socks(env *C.JNIEnv, clazz C.jclass, tunFd C.jint, mtu C.jint, ip *C.jstring, prefix *C.jstring, socksAddr *C.jstring, udpgwAddr *C.jstring, udpgwTransDNS C.jboolean) {
          }

          //export Java_dev_epro_tun2socks_Tun2Socks_terminateTun2Socks
          func Java_dev_epro_tun2socks_Tun2Socks_terminateTun2Socks(env *C.JNIEnv, clazz C.jclass) {
          }

          func main() {}
          GOEOF

          # Utiliser xjasonlyu/tun2socks plus moderne
          cd /tmp
          git clone --depth=1 https://github.com/xjasonlyu/tun2socks.git tun2socks2
          cd tun2socks2

          # Cross-compiler pour armv7 Android
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME
          export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          export CGO_ENABLED=1
          export GOOS=android
          export GOARCH=arm
          export GOARM=7

          go build -buildmode=c-shared             -ldflags="-s -w"             -o /tmp/libtun2socks-armv7-jni.so             ./... 2>&1 || echo "Build tun2socks echoue, utiliser binaire precompile"

          if [ -f /tmp/libtun2socks-armv7-jni.so ]; then
            cp /tmp/libtun2socks-armv7-jni.so app/src/main/jniLibs/armeabi-v7a/libtun2socks.so
            echo "tun2socks armv7 JNI compile avec succes"
          else
            mkdir -p app/src/main/jniLibs/armeabi-v7a
          curl -L -o app/src/main/jniLibs/armeabi-v7a/libtun2socks.so https://github.com/kinf744/kighmu-vpn/releases/download/v1.0-binary/libtun2socks-armv7.so
            echo "Utilisation binaire precompile armv7"
          fi

          ls -la app/src/main/jniLibs/arm64-v8a/
          ls -la app/src/main/jniLibs/armeabi-v7a/

      - name: Create Keystore
        run: |
          keytool -genkeypair -v             -keystore kighmu.keystore             -alias kighmu_key             -keyalg RSA             -keysize 2048             -validity 10000             -storepass KighmuStore2024!             -keypass KighmuKey2024!             -dname "CN=KIGHMU VPN, OU=Mobile, O=KIGHMU, L=Unknown, S=Unknown, C=US"
          keytool -list -keystore kighmu.keystore -storepass KighmuStore2024! | head -3

      - name: Build APK
        run: gradle assembleRelease --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/release/app-release.apk
