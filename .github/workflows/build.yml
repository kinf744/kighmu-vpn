name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Download native binaries
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libdnstt.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/376422237"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libhysteria.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/378442939"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libpdnsd.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/378443137"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/arm64-v8a/libtun2socks_ssc.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/385094917"
          mkdir -p app/libs
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libtun2socks.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/378443119"
          ls -la app/src/main/jniLibs/armeabi-v7a/

      - name: Create Keystore
        run: |
          keytool -genkeypair -v \
            -keystore kighmu.keystore \
            -alias kighmu_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass KighmuStore2024! \
            -keypass KighmuKey2024! \
            -dname "CN=KIGHMU VPN, OU=Mobile, O=KIGHMU, L=Unknown, S=Unknown, C=US"
          keytool -list -keystore kighmu.keystore -storepass KighmuStore2024! | head -3

      - name: Build APK
        run: gradle assembleRelease --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/release/app-release.apk
