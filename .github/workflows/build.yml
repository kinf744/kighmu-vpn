name: Build KIGHMU VPN

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Go (Xray + Hysteria) ───────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # ── 4. Android NDK ────────────────────────────────────────────────────
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      # ── 5. Gradle wrapper ─────────────────────────────────────────────────
      - name: Setup Gradle wrapper
        run: |
          chmod +x gradlew 2>/dev/null || true
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -sL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

      # ── 6. Build Xray-core ────────────────────────────────────────────────
      - name: Build Xray-core for Android
        continue-on-error: true
        run: |
          go install github.com/xtls/xray-core/main@latest || true
          ABIS=("arm64-v8a:arm64:" "armeabi-v7a:arm:7" "x86_64:amd64:")
          for ABI_DEF in "${ABIS[@]}"; do
            ABI="${ABI_DEF%%:*}"; REST="${ABI_DEF#*:}"
            GOARCH="${REST%%:*}"; GOARM="${REST##*:}"
            mkdir -p "app/src/main/assets/xray/$ABI"
            GOARM_OPT=""; [ -n "$GOARM" ] && GOARM_OPT="GOARM=$GOARM"
            eval "CGO_ENABLED=0 GOOS=android GOARCH=$GOARCH $GOARM_OPT \
              go build -trimpath -ldflags='-s -w' \
              -o app/src/main/assets/xray/$ABI/xray \
              github.com/xtls/xray-core/main" \
              && echo "✓ xray/$ABI built" || echo "⚠ xray/$ABI skipped"
          done

      # ── 7. Build Hysteria2 ────────────────────────────────────────────────
      - name: Build Hysteria2 for Android
        continue-on-error: true
        run: |
          ABIS=("arm64-v8a:arm64:" "armeabi-v7a:arm:7" "x86_64:amd64:")
          for ABI_DEF in "${ABIS[@]}"; do
            ABI="${ABI_DEF%%:*}"; REST="${ABI_DEF#*:}"
            GOARCH="${REST%%:*}"; GOARM="${REST##*:}"
            mkdir -p "app/src/main/assets/hysteria/$ABI"
            GOARM_OPT=""; [ -n "$GOARM" ] && GOARM_OPT="GOARM=$GOARM"
            eval "CGO_ENABLED=0 GOOS=android GOARCH=$GOARCH $GOARM_OPT \
              go build -trimpath -ldflags='-s -w' \
              -o app/src/main/assets/hysteria/$ABI/hysteria2 \
              github.com/apernet/hysteria/app/cmd" \
              && echo "✓ hysteria/$ABI built" || echo "⚠ hysteria/$ABI skipped"
          done

      # ── 8. Build Debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # ── 9. Build Release APK ──────────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # ── 10. Sign Release APK (requires GitHub secrets) ────────────────────
      - name: Sign Release APK
        id: sign_app
        continue-on-error: true
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # ── 11. Collect outputs ───────────────────────────────────────────────
      - name: Collect APKs
        run: |
          VERSION="${GITHUB_REF_NAME:-snapshot}"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             "dist/KIGHMU-VPN-${VERSION}-debug.apk" 2>/dev/null || true
          SIGNED="${{ steps.sign_app.outputs.signedReleaseFile }}"
          if [ -n "$SIGNED" ] && [ -f "$SIGNED" ]; then
            cp "$SIGNED" "dist/KIGHMU-VPN-${VERSION}-release-signed.apk"
            echo "✓ Signed APK ready"
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk \
               "dist/KIGHMU-VPN-${VERSION}-release-unsigned.apk" 2>/dev/null || true
            echo "ℹ Unsigned APK (add GitHub secrets to enable signing)"
          fi
          ls -lh dist/

      # ── 12. Upload artifacts ──────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-debug
          path: dist/*-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-release
          path: dist/*-release*.apk
          retention-days: 90

      # ── 13. GitHub Release (on tag v*) ────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          name: "KIGHMU VPN ${{ github.ref_name }}"
          body: |
            ## KIGHMU VPN ${{ github.ref_name }}

            ### Supported Tunnel Modes
            | Mode | Protocol |
            |------|----------|
            | SlowDNS | DNS over UDP/TCP |
            | HTTP Proxy + Payload | Custom HTTP injection |
            | SSH WebSocket | SSH over WS/WSS |
            | SSH SSL/TLS | SSH wrapped in TLS |
            | V2Ray / Xray | VMESS, VLESS, Trojan, Shadowsocks |
            | V2Ray + SlowDNS | Xray over DNS transport |
            | Hysteria UDP | QUIC/UDP high-speed tunnel |

            ### Installation
            1. Download the APK
            2. Enable "Install from unknown sources"
            3. Install and grant VPN permission

            ### Config Import
            Import `.kighmu` config files directly from the app menu.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
