name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build dnstt-client for Android ARM
        run: |
          mkdir -p app/src/main/assets/dnstt
          cd /tmp
          # Utiliser go install directement
          GOPATH=/tmp/gopath
          mkdir -p $GOPATH
          export GOPATH=$GOPATH
          go install -v github.com/jech/dnstt/dnstt-client@latest 2>&1 || true
          # Compiler pour android/arm
          go env GOPATH
          find $GOPATH -name "*.go" 2>/dev/null | head -5
          # Alternative: wget avec user-agent
          wget -q --user-agent="Mozilla/5.0"             "https://codeload.github.com/jech/dnstt/tar.gz/refs/heads/master"             -O /tmp/dnstt.tar.gz
          ls -la /tmp/dnstt.tar.gz
          file /tmp/dnstt.tar.gz
          tar -xzf /tmp/dnstt.tar.gz -C /tmp/
          ls /tmp/ | grep dnstt
          cd /tmp/dnstt-master/dnstt-client
          GOOS=android GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -v -o /tmp/dnstt-client . 2>&1
          if [ -f /tmp/dnstt-client ]; then
            cp /tmp/dnstt-client $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
            echo "SUCCESS: $(ls -la $GITHUB_WORKSPACE/app/src/main/assets/dnstt/)"
          else
            echo "FAILED - placeholder"
            echo "placeholder" > $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
          fi
      - name: Build APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
