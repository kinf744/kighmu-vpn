name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.3.0
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1.6.0
        id: ndk
        with:
          ndk-version: r26d

      - name: Download native binaries
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libdnstt.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/376422237"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libhysteria.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/378442939"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libpdnsd.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/378443137"
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/arm64-v8a/libtun2socks_ssc.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/385094917"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libhev-socks5-tunnel.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/406297759"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/406297767"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" -o app/src/main/jniLibs/armeabi-v7a/libzib.so "https://api.github.com/repos/kinf744/kighmu-vpn/releases/assets/408956032"
          mkdir -p app/libs
          echo "libtun2socks.so already in repo (hev multi-SOCKS), skipping download"
          ls -la app/src/main/jniLibs/armeabi-v7a/

      - name: Create Keystore
        run: |
          keytool -genkeypair -v \
            -keystore kighmu.keystore \
            -alias kighmu_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype PKCS12 \
            -storepass KighmuStore2024! \
            -keypass KighmuStore2024! \
            -dname "CN=KIGHMU VPN, OU=Mobile, O=KIGHMU, L=Unknown, ST=Unknown, C=US"
          keytool -list -keystore kighmu.keystore -storepass KighmuStore2024! | head -3

      - name: Build APK
        run: gradle assembleRelease --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          KEYSTORE_PATH: kighmu.keystore
          KEYSTORE_PASSWORD: KighmuStore2024!
          KEY_ALIAS: kighmu_key
          KEY_PASSWORD: KighmuStore2024!

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/release/app-release.apk
