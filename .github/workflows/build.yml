name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Download dnstt-client for Android
        run: |
          mkdir -p app/src/main/assets/dnstt
          # Telecharger dnstt-client precompile pour armeabi-v7a
          curl -L "https://github.com/jech/dnstt/releases/download/v0.20220208/dnstt-client-android-arm.tar.gz"             -o /tmp/dnstt.tar.gz 2>/dev/null || true
          if [ -f /tmp/dnstt.tar.gz ] && [ -s /tmp/dnstt.tar.gz ]; then
            tar -xzf /tmp/dnstt.tar.gz -C /tmp/ 2>/dev/null || true
            find /tmp -name "dnstt-client*" -type f | head -1 | xargs -I{} cp {} app/src/main/assets/dnstt/dnstt-client 2>/dev/null || true
          fi
          # Fallback: compiler depuis les sources
          if [ ! -f app/src/main/assets/dnstt/dnstt-client ]; then
            echo "Building dnstt-client from source..."
            sudo apt-get install -y golang-go 2>/dev/null || true
            git clone --depth=1 https://github.com/jech/dnstt /tmp/dnstt-src 2>/dev/null || true
            if [ -d /tmp/dnstt-src ]; then
              cd /tmp/dnstt-src/dnstt-client
              GOOS=android GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -o /tmp/dnstt-client . 2>/dev/null || true
              cp /tmp/dnstt-client $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client 2>/dev/null || true
              cd $GITHUB_WORKSPACE
            fi
          fi
          ls -la app/src/main/assets/dnstt/ || echo "dnstt assets empty"
      - name: Build APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
