name: Build KIGHMU VPN
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build dnstt-client for Android ARM
        run: |
          mkdir -p app/src/main/assets/dnstt
          # Telecharger via proxy Go (pas git)
          export GOPATH=/tmp/gopath
          export GOPROXY=https://proxy.golang.org
          export GONOSUMDB=*
          export GOFLAGS=
          export GIT_TERMINAL_PROMPT=0
          mkdir -p /tmp/dnstt-build
          cd /tmp/dnstt-build
          go mod init build
          # Telecharger uniquement via proxy (pas git direct)
          GONOSUMDB=* GOPROXY=https://proxy.golang.org go get github.com/jech/dnstt/dnstt-client@v0.20220208 2>&1
          SRC=$(find $GOPATH/pkg/mod -name "*.go" -path "*/dnstt-client*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          echo "SRC=$SRC"
          if [ -n "$SRC" ] && [ -d "$SRC" ]; then
            chmod -R u+w $GOPATH/pkg/mod/
            cd "$SRC"
            GOOS=android GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -v -o /tmp/dnstt-client . 2>&1
          fi
          if [ -f /tmp/dnstt-client ]; then
            cp /tmp/dnstt-client $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
            echo "SUCCESS"
            ls -la $GITHUB_WORKSPACE/app/src/main/assets/dnstt/
          else
            echo "FAILED - placeholder"
            printf 'placeholder' > $GITHUB_WORKSPACE/app/src/main/assets/dnstt/dnstt-client
          fi
      - name: Build APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - uses: actions/upload-artifact@v4
        with:
          name: KIGHMU-VPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
