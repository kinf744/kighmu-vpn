name: Build xjasonlyu tun2socks JNI armeabi-v7a

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'tun2socks_jni/**'
      - '.github/workflows/build_tun2socks_jni.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20240604190613-2782386b8afd
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20240604190613-2782386b8afd
          # Vérifier que gomobile est installé
          which gomobile
          gomobile version

      - name: Setup gomobile
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          cd tun2socks_jni
          # Ajouter mobile comme dépendance explicite
          go get golang.org/x/mobile/bind@v0.0.0-20240604190613-2782386b8afd
          go mod tidy
          gomobile init -v

      - name: Build AAR
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          cd tun2socks_jni
          gomobile bind \
            -target=android/arm \
            -androidapi=21 \
            -v \
            -o tun2socks_jni.aar \
            .
          ls -lh tun2socks_jni.aar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tun2socks-jni-aar
          path: tun2socks_jni/tun2socks_jni.aar
