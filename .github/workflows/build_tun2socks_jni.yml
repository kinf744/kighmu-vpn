name: Build xjasonlyu tun2socks JNI armeabi-v7a

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build_tun2socks_jni.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20240604190613-2782386b8afd
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20240604190613-2782386b8afd
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init -v

      - name: Create JNI wrapper
        run: |
          mkdir -p tun2socks_jni
          cat > tun2socks_jni/go.mod << 'GOMOD'
module github.com/kighmu/tun2socks_jni

go 1.23

require (
    github.com/xjasonlyu/tun2socks/v2 v2.6.0
    golang.org/x/mobile v0.0.0-20240604190613-2782386b8afd
)
GOMOD

          cat > tun2socks_jni/tun2socks.go << 'GOCODE'
package tun2socks_jni

import (
    "fmt"
    "github.com/xjasonlyu/tun2socks/v2/engine"
)

var started bool

// StartTun2Socks starts tun2socks with tunFd and socks5 proxy
func StartTun2Socks(tunFd int, socksAddr string, mtu int) error {
    if started {
        engine.Stop()
    }
    key := &engine.Key{
        Device: fmt.Sprintf("fd://%d", tunFd),
        Proxy:  socksAddr,
        MTU:    mtu,
    }
    engine.Insert(key)
    engine.Start()
    started = true
    return nil
}

// StopTun2Socks stops tun2socks
func StopTun2Socks() {
    engine.Stop()
    started = false
}
GOCODE

      - name: Build AAR
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          cd tun2socks_jni
          go mod tidy
          gomobile bind \
            -target=android/arm \
            -androidapi=21 \
            -v \
            -o tun2socks_jni.aar \
            .
          ls -lh tun2socks_jni.aar

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tun2socks-jni-aar
          path: tun2socks_jni/tun2socks_jni.aar
