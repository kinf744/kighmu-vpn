name: Build xjasonlyu tun2socks JNI armeabi-v7a

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'tun2socks_jni/**'
      - '.github/workflows/build_tun2socks_jni.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build AAR
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          cd tun2socks_jni
          # Utiliser version compatible Go 1.21
          go mod edit -go=1.21
          go mod edit -require=github.com/xjasonlyu/tun2socks/v2@v2.5.1
          go mod tidy
          gomobile bind \
            -target=android/arm \
            -androidapi=21 \
            -v \
            -o tun2socks_jni.aar \
            .
          ls -lh tun2socks_jni.aar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tun2socks-jni-aar
          path: tun2socks_jni/tun2socks_jni.aar
