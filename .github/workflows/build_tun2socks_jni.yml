name: Build xjasonlyu tun2socks JNI armeabi-v7a

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build_tun2socks_jni.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Clone and build go-tun2socks-android
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          git clone https://github.com/eycorsican/go-tun2socks-android.git
          cd go-tun2socks-android
          cat Makefile | head -20
          ls -la

      - name: Upload source info
        uses: actions/upload-artifact@v4
        with:
          name: source-info
          path: go-tun2socks-android/
