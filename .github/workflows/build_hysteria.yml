name: Build Hysteria for Android ARM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone Hysteria v1 and explore
        run: |
          git clone --depth=1 --branch v1.3.5 https://github.com/HyNetwork/hysteria.git
          echo "=== Root ===" && ls hysteria/
          echo "=== Find main.go ===" && find hysteria -name "main.go" 2>/dev/null

      - name: Build Hysteria1 armeabi-v7a
        run: |
          cd hysteria
          MAIN_DIR=$(find . -name "main.go" | head -1 | xargs dirname)
          echo "Main dir: $MAIN_DIR"
          export CC=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          export CXX=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++
          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 \
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o ../libhysteria.so \
            ./$MAIN_DIR
          ls -lh ../libhysteria.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libhysteria-armeabi-v7a
          path: libhysteria.so
