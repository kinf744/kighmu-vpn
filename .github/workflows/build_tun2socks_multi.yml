name: Build tun2socks multi-SOCKS armeabi-v7a

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake ninja-build

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Clone BadVPN
        run: git clone --depth=1 https://github.com/ambrop72/badvpn.git

      - name: Patch multi-SOCKS round-robin
        run: |
          cd badvpn
          # Voir le code actuel de socks_server_addr
          grep -n "socks_server_addr\|num_auth\|server_addr" tun2socks/tun2socks.c | head -30

      - name: Upload source info
        uses: actions/upload-artifact@v4
        with:
          name: badvpn-source-info
          path: badvpn/tun2socks/tun2socks.c
